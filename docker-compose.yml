services:
  postgres:
    image: postgres:16
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: joss
      POSTGRES_PASSWORD: joss
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: inventory_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
